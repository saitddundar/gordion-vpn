version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: gordion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gordion
      POSTGRES_USER: gordion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gordion"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gordion-network

  # Redis (Discovery Service)
  redis:
    image: redis:7-alpine
    container_name: gordion-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gordion-network

  # Prometheus (Metrics Collection)
  prometheus:
    image: prom/prometheus:latest
    container_name: gordion-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - gordion-network

  # Grafana (Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: gordion-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - gordion-network

  # Identity Service
  identity:
    build:
      context: ..
      dockerfile: services/identity/Dockerfile
    container_name: gordion-identity
    restart: unless-stopped
    ports:
      - "8001:8001"
      - "9090:9090"
    environment:
      - DATABASE_URL=postgresql://gordion:${POSTGRES_PASSWORD:-dev_password_123}@postgres:5432/gordion?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-dev_secret_key_123}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gordion-network

  # Discovery Service
  discovery:
    build:
      context: ..
      dockerfile: services/discovery/Dockerfile
    container_name: gordion-discovery
    restart: unless-stopped
    ports:
      - "8002:8002"
      - "9093:9091"
    environment:
      - REDIS_URL=redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gordion-network

  # Config Service
  config:
    build:
      context: ..
      dockerfile: services/config/Dockerfile
    container_name: gordion-config
    restart: unless-stopped
    ports:
      - "8003:8003"
      - "9094:9092"
    environment:
      - REDIS_URL=redis:6379
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gordion-network

  # Agent (VPN Client)
  agent:
    build:
      context: ..
      dockerfile: services/agent/Dockerfile
    container_name: gordion-agent
    restart: unless-stopped
    environment:
      - IDENTITY_ADDR=gordion-identity:8001
      - DISCOVERY_ADDR=gordion-discovery:8002
      - CONFIG_ADDR=gordion-config:8003
    cap_add:
      - NET_ADMIN
    depends_on:
      - identity
      - discovery
      - config
    networks:
      - gordion-network

networks:
  gordion-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local